<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <!-- 预加载防闪烁：在首帧渲染前设置 data-theme + 背景色 -->
    <script>
      (function() {
        var VALID = ["dark","light","system"];
        var theme = localStorage.getItem("claw-theme") || "system";
        if (VALID.indexOf(theme) === -1) theme = "system";
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var isDark = theme === 'dark' || (theme === 'system' && prefersDark);
        document.documentElement.setAttribute("data-theme", isDark ? "dark" : "light");
        // 立即设置 body 背景色，防止白屏闪烁
        var bg = isDark ? '#1a1b1d' : '#f5f6f6';
        var style = document.createElement('style');
        style.textContent = 'html, body { background-color: ' + bg + '; }';
        document.head.appendChild(style);
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
