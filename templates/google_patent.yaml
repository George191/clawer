name: google_patent
display_name: "Google Patents - {query}"
base_url: "https://patents.google.com"
data_type: patent
adapter: google_patent
anti_crawl_enabled: true
description: >
  Google Patents 通用搜索，支持任意查询语法。

  查询示例:
    按专利号:    US-2024144562-A1
    按权利人:    assignee:Google
    按发明人:    inventor:Smith
    组合搜索:    assignee:Google AND AI
    带过滤条件:  assignee:Tesla AND status:GRANT AND after:priority:20200101
    批量专利号:  US-123-A1+OR+US-456-B2  (由 build_batch_patent_param 自动拼接)

  Google Patents XHR API 查询参数 (url= 内部):
    q=         搜索关键词, 支持 assignee:XXX, inventor:XXX, AND/OR 语法
    page=      页码 (0 开始)
    num=       每页结果数 (默认10, 最大100)
    sort=      排序: new(最新优先) / old(最早优先)
    status=    专利状态: GRANT(已授权) / APPLICATION(申请中)
    type=      专利类型: PATENT(发明专利) / DESIGN(外观设计)
    after=     最早日期: priority:YYYYMMDD / filing:YYYYMMDD / publication:YYYYMMDD
    before=    最晚日期: 同上格式
    language=  语言: ENGLISH, CHINESE 等
    country=   国家代码: US, CN, WO 等

batch_params:
  file_path: "data/publication_numbers.txt"
  param_name: "query"
  batch_size: 5
  start_line: 0
  limit: null
  delay: 0

params:
  - name: query
    description: >
      搜索查询, 支持所有 Google Patents 查询语法:
      专利号 US-2024144562-A1 / 权利人 assignee:Google /
      发明人 inventor:Smith / 组合 assignee:X AND AI /
      批量 ID1+OR+ID2 (由 batch 自动拼接)
    required: true

response_type: json
json_item_path: "results.cluster[0].result"
json_total_path: "results.total_num_results"
json_page_path: "results.num_page"
json_total_num_pages: "results.total_num_pages"

list_page: "/xhr/query?url=q={query}&page={page}&num={num}&exp=&tags=&peid={peid}"
list_request:
  method: GET
  headers:
    Accept: "application/json, text/plain, */*"
    Referer: "https://patents.google.com/"
  encoding: utf-8

list_fields:
  - name: id
    selector: "id"
    selector_type: json
    field_type: text
    required: true
    transform: strip

  - name: rank
    selector: "rank"
    selector_type: json
    field_type: number
    required: true

  - name: patent
    selector: "patent"
    selector_type: json
    field_type: json
    required: true

  - name: is_similar_document
    selector: "is_similar_document"
    selector_type: json
    field_type: boolean
    required: true

  - name: entity_matches
    selector: "entity_matches"
    selector_type: json
    field_type: json
    required: true

  - name: measure_matches
    selector: "measure_matches"
    selector_type: json
    field_type: json
    required: true

list_pagination:
  type: page_number
  page_param: page
  start_page: 0
  max_pages: 0
  results_per_page: 100

download:
  selector: "patent.pdf"
  selector_type: json
  link_type: href
  file_extension: pdf


# # 按专利号查
# --template google_patent:query=US-2024144562-A1

# # 按权利人查
# --template google_patent:query=assignee:Google

# # 按发明人查
# --template google_patent:query=inventor:Smith

# # 组合条件
# --template google_patent:query="assignee:Tesla AND status:GRANT AND after:priority:20200101"

# # 批量专利号 (用 list-file)
# --list-file data/publication_numbers.txt --list-param query --batch-size 5

# # 批量权利人 (batch-size=1，每行一个权利人)
# --list-file data/assignees.txt --list-param query --batch-size 1